

services:
  db:
    image: postgres:15-alpine
    container_name: insurance_saas_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: insurance_saas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: insurance_saas_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/insurance_saas
      SECRET_KEY: "SUPER_SECRET_KEY_SaaS_ACTUARIAL_2026"
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: insurance_saas_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
