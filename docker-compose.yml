services:
  db:
    image: postgres:15-alpine
    container_name: insurance_saas_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: insurance_saas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: insurance_saas_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: .
    container_name: insurance_saas_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/insurance_saas
      SECRET_KEY: "SUPER_SECRET_KEY_SaaS_ACTUARIAL_2026"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build: .
    container_name: insurance_saas_worker
    restart: always
    command: celery -A app.worker.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/insurance_saas
      SECRET_KEY: "SUPER_SECRET_KEY_SaaS_ACTUARIAL_2026"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - db
      - redis
      - backend

  frontend:
    build: ./frontend
    container_name: insurance_saas_frontend
    restart: always
    ports:
      - "80:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
