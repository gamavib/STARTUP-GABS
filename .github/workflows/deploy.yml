name: Deploy Actuarial SaaS

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/insurance-backend:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/insurance-backend:latest

      - name: Build and push Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/insurance-frontend:latest ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/insurance-frontend:latest

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/insurance-saas
            git pull origin main
            docker-compose pull
            docker-compose up -d --build
